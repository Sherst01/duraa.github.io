<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VELVET — Video Platform</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--pink:#FF2D78;--pink-soft:#FF6FA3;--pink-pale:#FFD6E7;--pink-glow:rgba(255,45,120,.25);--black:#0A0A0A;--card:#1A1A1A;--white:#FAFAFA;--dim:rgba(250,250,250,.65);--faint:rgba(250,250,250,.07)}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{background:var(--black);color:var(--white);font-family:'DM Sans',sans-serif;min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");pointer-events:none;z-index:9999;opacity:.5}
.screen{display:none}.screen.active{display:block}
#auth-screen{min-height:100vh;display:none;align-items:center;justify-content:center;position:relative;overflow:hidden}
#auth-screen.active{display:flex}
.blob{position:absolute;border-radius:50%;background:var(--pink-glow);filter:blur(90px);animation:blobF 9s ease-in-out infinite}
.b1{width:520px;height:520px;top:-220px;right:-120px}
.b2{width:320px;height:320px;bottom:-120px;left:-60px;animation-delay:3.5s}
@keyframes blobF{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-28px) scale(1.06)}}
.auth-card{position:relative;background:rgba(255,255,255,.025);border:1px solid rgba(255,45,120,.18);backdrop-filter:blur(24px);border-radius:28px;padding:52px 48px;width:420px;max-width:92vw;box-shadow:0 0 100px rgba(255,45,120,.07),inset 0 1px 0 rgba(255,255,255,.07);animation:rise .55s cubic-bezier(.25,.8,.25,1) both}
@keyframes rise{from{opacity:0;transform:translateY(28px)}to{opacity:1;transform:translateY(0)}}
.alogo{font-family:'Playfair Display',serif;font-size:2.2rem;font-weight:900;letter-spacing:-1px;margin-bottom:4px}
.alogo span{color:var(--pink)}
.asub{font-size:.78rem;color:var(--dim);letter-spacing:.16em;text-transform:uppercase;margin-bottom:36px}
.tabs{display:flex;background:var(--faint);border-radius:12px;padding:4px;gap:4px;margin-bottom:30px}
.tab{flex:1;padding:10px;border:none;background:transparent;border-radius:9px;color:var(--dim);font-family:'DM Sans',sans-serif;font-size:.87rem;font-weight:500;cursor:pointer;transition:all .22s}
.tab.on{background:var(--pink);color:#fff;box-shadow:0 4px 18px var(--pink-glow)}
.field{margin-bottom:18px}
.field label{display:block;font-size:.75rem;font-weight:500;color:var(--dim);letter-spacing:.09em;text-transform:uppercase;margin-bottom:7px}
.field input{width:100%;padding:13px 17px;background:rgba(255,255,255,.045);border:1px solid rgba(255,255,255,.09);border-radius:11px;color:var(--white);font-family:'DM Sans',sans-serif;font-size:.94rem;outline:none;transition:all .22s}
.field input:focus{border-color:var(--pink);background:rgba(255,45,120,.04);box-shadow:0 0 0 3px rgba(255,45,120,.09)}
.field input::placeholder{color:rgba(255,255,255,.22)}
.btn{width:100%;padding:14px;margin-top:6px;background:var(--pink);border:none;border-radius:12px;color:#fff;font-family:'DM Sans',sans-serif;font-size:.94rem;font-weight:600;cursor:pointer;box-shadow:0 8px 28px rgba(255,45,120,.32);transition:all .22s}
.btn:hover{transform:translateY(-2px);box-shadow:0 12px 38px rgba(255,45,120,.48);background:#ff4a8d}
.btn:active{transform:none}
.aerr{color:#ff7070;font-size:.81rem;text-align:center;margin-top:11px;display:none}
nav{position:sticky;top:0;background:rgba(10,10,10,.88);backdrop-filter:blur(22px);border-bottom:1px solid rgba(255,45,120,.1);height:66px;padding:0 40px;display:flex;align-items:center;justify-content:space-between;z-index:100}
.nlogo{font-family:'Playfair Display',serif;font-size:1.55rem;font-weight:900;letter-spacing:-.5px}
.nlogo span{color:var(--pink)}
.nright{display:flex;align-items:center;gap:18px}
.chip{display:flex;align-items:center;gap:9px;background:var(--faint);border:1px solid rgba(255,45,120,.18);border-radius:100px;padding:5px 15px 5px 5px}
.ava{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,var(--pink),#ff8ab4);display:flex;align-items:center;justify-content:center;font-size:.78rem;font-weight:700;color:#fff;text-transform:uppercase}
.uname{font-size:.84rem;font-weight:500}
.bout{background:transparent;border:1px solid rgba(255,255,255,.1);border-radius:8px;padding:6px 15px;color:var(--dim);font-family:'DM Sans',sans-serif;font-size:.81rem;cursor:pointer;transition:all .2s}
.bout:hover{border-color:var(--pink);color:var(--pink)}
.hero{padding:64px 40px 44px;text-align:center;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 70% 90% at 50% 0%,rgba(255,45,120,.13) 0%,transparent 70%);pointer-events:none}
.pill{display:inline-flex;align-items:center;gap:8px;background:rgba(255,45,120,.09);border:1px solid rgba(255,45,120,.22);border-radius:100px;padding:5px 15px;font-size:.76rem;font-weight:500;color:var(--pink-soft);letter-spacing:.1em;text-transform:uppercase;margin-bottom:22px}
.pdot{width:6px;height:6px;border-radius:50%;background:var(--pink);animation:blink 2s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.45;transform:scale(.75)}}
.hero h1{font-family:'Playfair Display',serif;font-size:clamp(2.2rem,4.5vw,3.8rem);font-weight:900;line-height:1.15;letter-spacing:-1px;margin-bottom:14px}
.hero h1 em{font-style:italic;color:var(--pink)}
.hero p{font-size:1rem;color:var(--dim);max-width:500px;margin:0 auto;line-height:1.65;font-weight:300}
.shead{padding:32px 40px 20px;display:flex;align-items:center;gap:14px}
.stitle{font-family:'Playfair Display',serif;font-size:1.5rem;font-weight:700;white-space:nowrap}
.sline{flex:1;height:1px;background:linear-gradient(to right,rgba(255,45,120,.28),transparent)}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:22px;padding:0 40px 100px}
.vcard{background:var(--card);border:1px solid rgba(255,255,255,.055);border-radius:18px;overflow:hidden;cursor:pointer;transition:all .3s cubic-bezier(.25,.8,.25,1);animation:rise .45s ease both}
.vcard:hover{transform:translateY(-6px);border-color:rgba(255,45,120,.32);box-shadow:0 18px 55px rgba(0,0,0,.5),0 0 0 1px rgba(255,45,120,.13)}
.vthumb{position:relative;aspect-ratio:16/9;overflow:hidden;background:#000}
.vthumb iframe.preview{width:100%;height:100%;border:none;pointer-events:none;transform:scale(1);transition:transform .4s ease}
.vcard:hover .vthumb iframe.preview{transform:scale(1.04)}
.tfb{width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#1a1a1a,#2a1020);font-size:2.8rem}
.povl{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.28);opacity:0;transition:opacity .3s}
.vcard:hover .povl{opacity:1}
.pring{width:52px;height:52px;border-radius:50%;background:var(--pink);display:flex;align-items:center;justify-content:center;box-shadow:0 0 28px rgba(255,45,120,.55);transform:scale(.84);transition:transform .28s}
.vcard:hover .pring{transform:scale(1)}
.tri{width:0;height:0;border-top:9px solid transparent;border-bottom:9px solid transparent;border-left:16px solid #fff;margin-left:3px}
.vinfo{padding:16px 18px 18px}
.vtag{font-size:.71rem;font-weight:600;color:var(--pink-soft);text-transform:uppercase;letter-spacing:.1em;margin-bottom:8px}
.vtitle{font-family:'Playfair Display',serif;font-size:1rem;font-weight:700;line-height:1.35;margin-bottom:8px;transition:color .2s}
.vcard:hover .vtitle{color:var(--pink-pale)}
.vdesc{font-size:.81rem;color:var(--dim);line-height:1.5;font-weight:300}
.empty{grid-column:1/-1;text-align:center;padding:60px 20px;color:var(--dim)}
.empty .big{font-size:3rem;margin-bottom:12px}
.empty p{font-size:.9rem;line-height:1.6}
#modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.92);backdrop-filter:blur(18px);z-index:1000;align-items:center;justify-content:center;padding:20px}
#modal.open{display:flex;animation:fadeIn .28s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.mbox{background:var(--card);border:1px solid rgba(255,45,120,.18);border-radius:22px;width:100%;max-width:920px;overflow:hidden;animation:rise .38s cubic-bezier(.25,.8,.25,1) both;max-height:92vh;overflow-y:auto}
.mvid{position:relative;aspect-ratio:16/9;background:#000}
.mvid iframe{width:100%;height:100%;border:none;display:block}
.minfo{padding:22px 26px 26px}
.mtop{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:12px}
.mtitle{font-family:'Playfair Display',serif;font-size:1.45rem;font-weight:700;flex:1;line-height:1.3}
.mcls{background:rgba(255,255,255,.055);border:1px solid rgba(255,255,255,.09);border-radius:50%;width:36px;height:36px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--dim);font-size:1.1rem;flex-shrink:0;margin-left:14px;transition:all .2s}
.mcls:hover{background:var(--pink);border-color:var(--pink);color:#fff}
.mtags{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
.mtag{background:rgba(255,45,120,.09);border:1px solid rgba(255,45,120,.22);color:var(--pink-soft);padding:3px 11px;border-radius:100px;font-size:.76rem;font-weight:500}
.mdesc{font-size:.88rem;color:var(--dim);line-height:1.65;font-weight:300}
.phead{padding:56px 40px 36px;display:flex;align-items:center;gap:28px;position:relative;overflow:hidden}
.phead::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 60% 100% at 0% 50%,rgba(255,45,120,.09) 0%,transparent 60%);pointer-events:none}
.pava{width:96px;height:96px;border-radius:50%;background:linear-gradient(135deg,var(--pink),#ff8ab4);display:flex;align-items:center;justify-content:center;font-family:'Playfair Display',serif;font-size:2.4rem;font-weight:900;color:#fff;border:3px solid rgba(255,45,120,.38);box-shadow:0 0 38px rgba(255,45,120,.28);flex-shrink:0;text-transform:uppercase}
.ptxt h2{font-family:'Playfair Display',serif;font-size:1.9rem;font-weight:700;margin-bottom:4px}
.ptxt p{font-size:.88rem;color:var(--dim);margin-bottom:14px}
.pstats{display:flex;gap:26px}
.snum{font-family:'Playfair Display',serif;font-size:1.45rem;font-weight:700;color:var(--pink)}
.slbl{font-size:.72rem;color:var(--dim);text-transform:uppercase;letter-spacing:.08em}
.bnav{position:fixed;bottom:0;left:0;right:0;background:rgba(10,10,10,.96);backdrop-filter:blur(22px);border-top:1px solid rgba(255,45,120,.09);display:flex;padding:10px 0 18px;z-index:50}
.nbtn{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;background:none;border:none;color:var(--dim);font-family:'DM Sans',sans-serif;font-size:.69rem;cursor:pointer;padding:8px;transition:color .2s}
.nbtn.on,.nbtn:hover{color:var(--pink)}
.nico{font-size:1.25rem}
.pb{padding-bottom:88px}
.toast{position:fixed;bottom:92px;left:50%;transform:translateX(-50%) translateY(16px);background:var(--pink);color:#fff;padding:11px 22px;border-radius:100px;font-size:.87rem;font-weight:500;opacity:0;transition:all .38s;z-index:2000;white-space:nowrap;box-shadow:0 8px 28px rgba(255,45,120,.38);pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* === ДОБАВЛЕНО: Лайки, Избранное, Карусель, Комментарии === */
.like-btn, .fav-btn {
  position: absolute;
  top: 12px;
  background: rgba(0,0,0,0.65);
  border: none;
  width: 38px;
  height: 38px;
  border-radius: 50%;
  color: #fff;
  font-size: 1.2rem;
  cursor: pointer;
  z-index: 15;
  transition: all 0.25s ease;
  display: flex;
  align-items: center;
  justify-content: center;
}
.like-btn { right: 12px; }
.fav-btn { right: 56px; }
.like-btn:hover, .fav-btn:hover { background: rgba(255,45,120,0.9); transform: scale(1.1); }
.like-btn.liked { color: #FF2D78; animation: likePop 0.4s; }
.fav-btn.faved { color: #FF2D78; }
@keyframes likePop { 0%{transform:scale(0.6)} 50%{transform:scale(1.3)} 100%{transform:scale(1)} }

.carousel { padding: 20px 40px 40px; position: relative; }
.carousel-wrapper { overflow: hidden; padding: 10px 0; }
.carousel-track { display: flex; gap: 22px; transition: transform 0.6s cubic-bezier(0.25, 0.8, 0.25, 1); }
.carousel-btn {
  position: absolute; top: 50%; transform: translateY(-50%);
  width: 46px; height: 46px; background: rgba(10,10,10,0.9);
  border: 1px solid rgba(255,45,120,0.4); color: var(--pink);
  border-radius: 50%; font-size: 1.5rem; cursor: pointer; z-index: 20;
}
.carousel-btn:hover { background: var(--pink); color: white; border-color: var(--pink); }
.carousel-btn.prev { left: 20px; }
.carousel-btn.next { right: 20px; }

.comments-section { margin-top: 30px; padding-top: 24px; border-top: 1px solid rgba(255,45,120,0.15); }
.comments-title { font-family: 'Playfair Display', serif; font-size: 1.3rem; color: var(--pink-soft); margin-bottom: 16px; }
#comments-list { max-height: 320px; overflow-y: auto; margin-bottom: 16px; }
.comment { background: rgba(255,255,255,0.03); border-radius: 14px; padding: 14px 18px; margin-bottom: 12px; font-size: 0.9rem; line-height: 1.5; }
.comment-author { color: var(--pink); font-weight: 600; font-size: 0.83rem; margin-bottom: 5px; }
.comment-time { font-size: 0.73rem; color: var(--dim); margin-top: 6px; }
.comment-form { display: flex; gap: 10px; }
.comment-form input { flex: 1; padding: 13px 17px; background: rgba(255,255,255,0.045); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; color: white; }
.comment-form button { padding: 0 26px; background: var(--pink); border: none; border-radius: 12px; color: white; font-weight: 600; cursor: pointer; }

@media(max-width:600px){nav,.hero,.shead,.grid,.phead{padding-left:16px;padding-right:16px}.grid{grid-template-columns:1fr}.phead{flex-direction:column;text-align:center}.pstats{justify-content:center}.auth-card{padding:34px 22px}}
</style>
</head>
<body>

<div id="auth-screen" class="screen active">
  <div class="blob b1"></div>
  <div class="blob b2"></div>
  <div class="auth-card">
    <div class="alogo">VELVET<span>.</span></div>
    <div class="asub">Premium Video Platform</div>
    <div class="tabs">
      <button class="tab on" id="t-in" onclick="switchTab('in')">Войти</button>
      <button class="tab" id="t-up" onclick="switchTab('up')">Регистрация</button>
    </div>
    <div id="f-in">
      <div class="field"><label>Email</label><input id="li-e" type="email" placeholder="you@email.com"></div>
      <div class="field"><label>Пароль</label><input id="li-p" type="password" placeholder="••••••••"></div>
      <button class="btn" onclick="login()">Войти →</button>
    </div>
    <div id="f-up" style="display:none">
      <div class="field"><label>Имя</label><input id="ru-n" type="text" placeholder="Ваше имя"></div>
      <div class="field"><label>Email</label><input id="ru-e" type="email" placeholder="you@email.com"></div>
      <div class="field"><label>Пароль</label><input id="ru-p" type="password" placeholder="Минимум 6 символов"></div>
      <button class="btn" onclick="register()">Создать аккаунт →</button>
    </div>
    <div class="aerr" id="aerr"></div>
  </div>
</div>

<div id="app-screen" class="screen">
  <nav>
    <div class="nlogo">VELVET<span>.</span></div>
    <div class="nright">
      <div class="chip"><div class="ava" id="nav-ava">U</div><span class="uname" id="nav-nm">User</span></div>
      <button class="bout" onclick="logout()">Выйти</button>
    </div>
  </nav>

  <div id="p-home" class="pb">
    <div class="hero">
      <div class="pill"><span class="pdot"></span>Эксклюзивный контент</div>
      <h1>Фанатам делаю сайт , а так он не  <em>вдохновляет</em></h1>
      <p>тут чисто это дура , хотя нет </p>
    </div>

    <!-- Карусель рекомендаций -->
    <div class="carousel">
      <button class="carousel-btn prev" onclick="moveCarousel(-1)">‹</button>
      <div class="carousel-wrapper">
        <div class="carousel-track" id="carousel-track"></div>
      </div>
      <button class="carousel-btn next" onclick="moveCarousel(1)">›</button>

  </div>

  <div id="p-prof" class="pb" style="display:none">
    <div class="phead">
      <div class="pava" id="pa-ava">U</div>
      <div class="ptxt">
        <h2 id="pa-nm">—</h2>
        <p id="pa-em">—</p>
        <div class="pstats">
          <div><div class="snum" id="st-w">0</div><div class="slbl">Просмотрено</div></div>
          <div><div class="snum" id="st-t">0</div><div class="slbl">Всего видео</div></div>
        </div>
      </div>
    </div>
    <div class="shead"><h2 class="stitle">История просмотров</h2><div class="sline"></div></div>
    <div class="grid" id="hgrid"></div>
  </div>

  <div class="bnav">
    <button class="nbtn on" id="bn-h" onclick="showPage('home')"><span class="nico">🏠</span><span>Главная</span></button>
    <button class="nbtn" id="bn-p" onclick="showPage('prof')"><span class="nico">👤</span><span>Профиль</span></button>
  </div>
</div>

<div id="modal">
  <div class="mbox">
    <div class="mvid" id="mvid"></div>
    <div class="minfo">
      <div class="mtop">
        <div class="mtitle" id="mtitle">—</div>
        <button class="mcls" onclick="closeModal()">✕</button>

      <div class="mtags" id="mtags"></div>
      <div class="mdesc" id="mdesc"></div>

      <!-- Комментарии -->
      <div class="comments-section">
        <div class="comments-title">Комментарии <span id="comment-count">(0)</span></div>
        <div id="comments-list"></div>
        <div class="comment-form">
          <input id="comment-input" type="text" placeholder="Напишите комментарий... 🌸">
          <button onclick="addComment()">Отправить</button>
        </div>
      </div>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
/* ╔══════════════════════════════════════════════════════╗
   ║  🎬 ВИДЕО — редактируй только здесь                 ║
   ╚══════════════════════════════════════════════════════╝ */
const VIDEOS = [
  { id: 1, title: "Дура на связи", category: "Видео 1", desc: "Дура на связи 📞🌸", tags: ["Дура на связи"], url: "https://streamable.com/lyj7ip" },
  { id: 2, title: "Дура на связи", category: "Видео 2", desc: "Дура на связи 📞🌸", tags: ["Дура на связи"], url: "https://streamable.com/rx0m5p" }
];

/* ── Определяем тип ── */
function parseUrl(url) {
  if (!url) return { type: 'none' };
  const yt = url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/)([\w-]+)/);
  if (yt) return { type: 'youtube', id: yt[1] };
  const vm = url.match(/vimeo\.com\/(\d+)/);
  if (vm) return { type: 'vimeo', id: vm[1] };
  const st = url.match(/streamable\.com\/([a-z0-9]+)$/i);
  if (st) return { type: 'streamable', id: st[1] };
  return { type: 'direct', url };
}

function makeThumb(v) {
  const p = parseUrl(v.url);
  if (p.type === 'youtube') return `<img src="https://img.youtube.com/vi/${p.id}/hqdefault.jpg" alt="${v.title}" loading="lazy">`;
  if (p.type === 'streamable') return `<iframe class="preview" src="https://streamable.com/e/${p.id}?autoplay=0&muted=1&controls=0&loop=1" allow="autoplay" allowfullscreen></iframe>`;
  if (p.type === 'direct') return `<video src="${p.url}#t=2" preload="metadata" muted playsinline></video>`;
  return `<div class="tfb">🎬</div>`;
}

function makePlayer(v) {
  const p = parseUrl(v.url);
  if (p.type === 'youtube') return `<iframe src="https://www.youtube.com/embed/${p.id}?autoplay=1&rel=0" allow="autoplay; fullscreen" allowfullscreen></iframe>`;
  if (p.type === 'vimeo') return `<iframe src="https://player.vimeo.com/video/${p.id}?autoplay=1" allow="autoplay; fullscreen" allowfullscreen></iframe>`;
  if (p.type === 'streamable') return `<iframe src="https://streamable.com/e/${p.id}?autoplay=1" allow="autoplay; fullscreen" allowfullscreen></iframe>`;
  if (p.type === 'direct') return `<video src="${p.url}" controls autoplay style="width:100%;height:100%;background:#000"></video>`;
  return `<div style="display:flex;align-items:center;justify-content:center;height:200px;color:var(--dim)">Формат не поддерживается</div>`;
}

/* ════ STATE ════ */
let user = null, hist = [];
let likes = JSON.parse(localStorage.getItem('vv_likes') || '[]');
let favorites = JSON.parse(localStorage.getItem('vv_favorites') || '[]');
let allComments = JSON.parse(localStorage.getItem('vv_comments') || '{}');
let currentVideoId = null;

const sv = localStorage.getItem('vv_user');
if (sv) { 
  user = JSON.parse(sv); 
  hist = JSON.parse(localStorage.getItem('vv_h_' + user.email) || '[]'); 
  boot(); 
}

function switchTab(t) { /* ... твой оригинальный код ... */ 
  document.getElementById('t-in').classList.toggle('on', t === 'in');
  document.getElementById('t-up').classList.toggle('on', t === 'up');
  document.getElementById('f-in').style.display = t === 'in' ? 'block' : 'none';
  document.getElementById('f-up').style.display = t === 'up' ? 'block' : 'none';
  document.getElementById('aerr').style.display = 'none';
}
function serr(m) { const e = document.getElementById('aerr'); e.textContent = m; e.style.display = 'block'; }
function register() { /* твой оригинальный код */ 
  const n = document.getElementById('ru-n').value.trim();
  const e = document.getElementById('ru-e').value.trim();
  const p = document.getElementById('ru-p').value;
  if (!n) return serr('Введите имя');
  if (!e.includes('@')) return serr('Некорректный email');
  if (p.length < 6) return serr('Пароль — минимум 6 символов');
  const us = JSON.parse(localStorage.getItem('vv_users') || '{}');
  if (us[e]) return serr('Email уже зарегистрирован');
  us[e] = { n, e, p }; localStorage.setItem('vv_users', JSON.stringify(us));
  user = { name: n, email: e }; localStorage.setItem('vv_user', JSON.stringify(user));
  hist = []; boot(); toast('Добро пожаловать, ' + n + '! 🌸');
}
function login() { /* твой оригинальный код */ 
  const e = document.getElementById('li-e').value.trim();
  const p = document.getElementById('li-p').value;
  if (!e || !p) return serr('Заполните все поля');
  const us = JSON.parse(localStorage.getItem('vv_users') || '{}');
  if (!us[e]) return serr('Аккаунт не найден');
  if (us[e].p !== p) return serr('Неверный пароль');
  user = { name: us[e].n, email: e }; localStorage.setItem('vv_user', JSON.stringify(user));
  hist = JSON.parse(localStorage.getItem('vv_h_' + e) || '[]');
  boot(); toast('С возвращением, ' + user.name + '! 👋');
}
function logout() {
  localStorage.removeItem('vv_user'); user = null;
  document.getElementById('auth-screen').classList.add('active');
  document.getElementById('app-screen').classList.remove('active');
}

function boot() {
  document.getElementById('auth-screen').classList.remove('active');
  document.getElementById('app-screen').classList.add('active');
  const i = user.name[0].toUpperCase();
  ['nav-ava', 'pa-ava'].forEach(id => document.getElementById(id).textContent = i);
  document.getElementById('nav-nm').textContent = user.name;
  document.getElementById('pa-nm').textContent = user.name;
  document.getElementById('pa-em').textContent = user.email;
  document.getElementById('st-t').textContent = VIDEOS.length;
  renderGrid();
  updateStats();
  initNewFeatures();
}

function showPage(p) {
  document.getElementById('p-home').style.display = p === 'home' ? 'block' : 'none';
  document.getElementById('p-prof').style.display = p === 'prof' ? 'block' : 'none';
  document.getElementById('bn-h').classList.toggle('on', p === 'home');
  document.getElementById('bn-p').classList.toggle('on', p === 'prof');
  if (p === 'prof') renderHist();
  if (p === 'home') setTimeout(() => { renderCarousel(); updateLikeUI(); }, 150);
}

function card(v, d) {
  return `<div class="vcard" onclick="openVideo(${v.id})" style="animation-delay:${d}s">
    <div class="vthumb">
      <button class="fav-btn" onclick="toggleFavorite(${v.id}, event)">★</button>
      <button class="like-btn" onclick="toggleLike(${v.id}, event)">♡</button>
      ${makeThumb(v)}
      <div class="povl"><div class="pring"><div class="tri"></div></div></div>
    </div>
    <div class="vinfo"><div class="vtag">${v.category}</div><div class="vtitle">${v.title}</div><div class="vdesc">${v.desc}</div></div>
  </div>`;
}

function renderGrid() {
  const g = document.getElementById('vgrid');
  g.innerHTML = VIDEOS.length ? VIDEOS.map((v, i) => card(v, i * 0.1)).join('') : `<div class="empty"><div class="big">🎬</div><p>Видео пока нет.</p></div>`;
}

function renderHist() {
  const g = document.getElementById('hgrid');
  const h = VIDEOS.filter(v => hist.includes(v.id));
  g.innerHTML = h.length ? h.map((v, i) => card(v, i * 0.1)).join('') : `<div class="empty"><div class="big">📺</div><p>Вы ещё ничего не смотрели.</p></div>`;
}

/* ====================== НОВЫЕ ФУНКЦИИ ====================== */
function toggleLike(id, e) {
  e.stopImmediatePropagation();
  if (likes.includes(id)) likes = likes.filter(x => x !== id);
  else likes.push(id);
  localStorage.setItem('vv_likes', JSON.stringify(likes));
  updateLikeUI();
}

function toggleFavorite(id, e) {
  e.stopImmediatePropagation();
  if (favorites.includes(id)) favorites = favorites.filter(x => x !== id);
  else favorites.push(id);
  localStorage.setItem('vv_favorites', JSON.stringify(favorites));
  updateLikeUI();
  toast(favorites.includes(id) ? 'Добавлено в избранное ❤️' : 'Убрано из избранного');
}

function updateLikeUI() {
  document.querySelectorAll('.vcard').forEach(card => {
    const match = card.getAttribute('onclick').match(/\d+/);
    if (!match) return;
    const id = parseInt(match[0]);
    const likeBtn = card.querySelector('.like-btn');
    const favBtn = card.querySelector('.fav-btn');
    if (likeBtn) likeBtn.classList.toggle('liked', likes.includes(id));
    if (favBtn) favBtn.classList.toggle('faved', favorites.includes(id));
  });
}

function renderCarousel() {
  const track = document.getElementById('carousel-track');
  if (!track) return;
  const shuffled = [...VIDEOS].sort(() => Math.random() - 0.5).slice(0, 8);
  track.innerHTML = shuffled.map(v => `<div style="min-width:290px;flex-shrink:0">${card(v,0)}</div>`).join('');
  updateLikeUI();
}

let carouselPos = 0;
function moveCarousel(dir) {
  const track = document.getElementById('carousel-track');
  if (!track) return;
  const step = 312;
  carouselPos = Math.max(0, Math.min(carouselPos + dir, track.children.length - 3));
  track.style.transform = `translateX(-${carouselPos * step}px)`;
}

function renderComments(videoId) {
  const list = document.getElementById('comments-list');
  const count = document.getElementById('comment-count');
  if (!list) return;
  list.innerHTML = '';
  const comments = allComments[videoId] || [];
  count.textContent = `(${comments.length})`;
  comments.forEach(c => {
    const div = document.createElement('div');
    div.className = 'comment';
    div.innerHTML = `<div class="comment-author">${c.name}</div><div>${c.text}</div><div class="comment-time">${c.time}</div>`;
    list.appendChild(div);
  });
}

function addComment() {
  const input = document.getElementById('comment-input');
  const text = input.value.trim();
  if (!text || !currentVideoId) return;
  if (!allComments[currentVideoId]) allComments[currentVideoId] = [];
  allComments[currentVideoId].unshift({
    name: user.name,
    text: text,
    time: new Date().toLocaleTimeString('ru-RU', {hour:'2-digit', minute:'2-digit'})
  });
  localStorage.setItem('vv_comments', JSON.stringify(allComments));
  renderComments(currentVideoId);
  input.value = '';
  toast('Комментарий добавлен 🌸');
}

/* Открытие видео (исправлено) */
function openVideo(id) {
  const v = VIDEOS.find(x => x.id === id);
  if (!v) return;

  document.getElementById('mvid').innerHTML = makePlayer(v);
  document.getElementById('mtitle').textContent = v.title;
  document.getElementById('mtags').innerHTML = v.tags.map(t => `<span class="mtag">${t}</span>`).join('');
  document.getElementById('mdesc').textContent = v.desc;

  document.getElementById('modal').classList.add('open');
  document.body.style.overflow = 'hidden';

  if (!hist.includes(id)) {
    hist.unshift(id);
    localStorage.setItem('vv_h_' + user.email, JSON.stringify(hist));
    updateStats();
  }

  currentVideoId = id;
  setTimeout(() => renderComments(id), 300);
}

function closeModal() {
  document.getElementById('mvid').innerHTML = '';
  document.getElementById('modal').classList.remove('open');
  document.body.style.overflow = '';
  document.getElementById('comment-input').value = '';
}

function updateStats() {
  document.getElementById('st-w').textContent = hist.length;
}

function toast(m) {
  const e = document.getElementById('toast');
  e.textContent = m;
  e.classList.add('show');
  setTimeout(() => e.classList.remove('show'), 3200);
}

function initNewFeatures() {
  renderCarousel();
  updateLikeUI();
}

/* События */
document.getElementById('modal').addEventListener('click', e => {
  if (e.target === document.getElementById('modal')) closeModal();
});
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
});
</script>
</body>
</html>
