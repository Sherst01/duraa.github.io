<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VELVET — Video Platform</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --pink: #FF2D78;
    --black: #0A0A0A;
    --card: #1A1A1A;
  }
  body { background: var(--black); color: white; font-family: 'DM Sans', sans-serif; margin:0; }
  nav {
    background: rgba(10,10,10,0.95); backdrop-filter: blur(15px);
    padding: 20px 40px; display: flex; justify-content: space-between; align-items: center;
  }
  .nav-logo { font-family: 'Playfair Display', serif; font-size: 1.8rem; font-weight: 900; }
  .nav-logo span { color: var(--pink); }

  .main { padding: 60px 40px; max-width: 1200px; margin: 0 auto; }
  .video-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
    gap: 30px;
  }
  .video-card {
    background: var(--card); border-radius: 20px; overflow: hidden; cursor: pointer;
    transition: transform 0.4s, box-shadow 0.4s;
  }
  .video-card:hover { transform: translateY(-10px); box-shadow: 0 25px 60px rgba(255,45,120,0.3); }

  .video-thumb {
    position: relative; aspect-ratio: 16/9; background: #000;
  }
  .video-thumb img { width: 100%; height: 100%; object-fit: cover; }

  .play-overlay {
    position: absolute; inset: 0; background: rgba(0,0,0,0.5);
    display: flex; align-items: center; justify-content: center; opacity: 0; transition: 0.3s;
  }
  .video-card:hover .play-overlay { opacity: 1; }
  .play-circle {
    width: 70px; height: 70px; background: var(--pink); border-radius: 50%;
    display: flex; align-items: center; justify-content: center; font-size: 34px;
  }

  .video-info { padding: 20px; }
  .video-title { font-family: 'Playfair Display', serif; font-size: 1.25rem; margin-bottom: 8px; }

  /* Modal */
  #player-modal {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.96);
    z-index: 1000; align-items: center; justify-content: center; padding: 20px;
  }
  #player-modal.open { display: flex; }
  .modal-content {
    width: 100%; max-width: 1000px; background: var(--card); border-radius: 24px; overflow: hidden;
  }
  .modal-video-wrap { position: relative; padding-top: 56.25%; }
  .modal-video-wrap iframe {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  }
</style>
</head>
<body>

<nav>
  <div class="nav-logo">VELVET<span>.</span></div>
</nav>

<div class="main">
  <div class="video-grid" id="video-grid"></div>
</div>

<div id="player-modal">
  <div class="modal-content">
    <div class="modal-video-wrap" id="modal-video-wrap"></div>
    <div style="padding:25px;">
      <button onclick="closeModal()" style="float:right; background:none; border:none; font-size:28px; color:#aaa; cursor:pointer;">✕</button>
      <h2 id="modal-title" style="font-family:'Playfair Display',serif; font-size:1.7rem;"></h2>
      <p id="modal-desc" style="color:#aaa; margin-top:10px;"></p>
    </div>
  </div>
</div>

<script>
const VIDEOS = [
  {
    id: 1,
    title: "снимает липинги ",
    url: "https://streamable.com/lyj7ip",
    desc: "протсо дура ",
    thumbnail: "https://cdn-cf-east.streamable.com/image/lyj7ip.jpg"
  },
  {
    id: 2,
    title: "на фотосесси ",
    url: "https://streamable.com/rx0m5p",
    desc: "типо красивя ",
    thumbnail: "https://cdn-cf-east.streamable.com/image/rx0m5p.jpg"
  }
];

function renderVideos() {
  const grid = document.getElementById('video-grid');
  grid.innerHTML = VIDEOS.map(v => `
    <div class="video-card" onclick="openVideo(${v.id})">
      <div class="video-thumb">
        <img src="${v.thumbnail}" alt="${v.title}">
        <div class="play-overlay"><div class="play-circle">▶</div></div>
      </div>
      <div class="video-info">
        <div class="video-title">${v.title}</div>
        <div style="color:#aaa;">${v.desc}</div>
      </div>
    </div>
  `).join('');
}

function openVideo(id) {
  const v = VIDEOS.find(x => x.id === id);
  const embed = v.url.replace('streamable.com/', 'streamable.com/e/');

  document.getElementById('modal-video-wrap').innerHTML = `
    <iframe src="${embed}" frameborder="0" allowfullscreen allow="autoplay"></iframe>
  `;
  document.getElementById('modal-title').textContent = v.title;
  document.getElementById('modal-desc').textContent = v.desc;
  document.getElementById('player-modal').classList.add('open');
}

function closeModal() {
  document.getElementById('player-modal').classList.remove('open');
}

window.onload = renderVideos;
</script>
</body>
</html>
